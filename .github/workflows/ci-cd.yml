name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: docker.io
  IMAGE_NAMESPACE: ${{ secrets.DOCKERHUB_USERNAME }}

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Lint backend
        working-directory: backend
        run: npm run lint

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install worker deps
        working-directory: worker
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run worker unit tests
        working-directory: worker/src
        run: python -m pytest -q

  build-and-push:
    needs: lint
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      image_tag: ${{ steps.vars.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Compute image tag
        id: vars
        run: echo "image_tag=$(echo $GITHUB_SHA | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/ai-task-platform-backend:${{ steps.vars.outputs.image_tag }}
            ${{ env.IMAGE_NAMESPACE }}/ai-task-platform-backend:latest

      - name: Build & push worker
        uses: docker/build-push-action@v6
        with:
          context: ./worker
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/ai-task-platform-worker:${{ steps.vars.outputs.image_tag }}
            ${{ env.IMAGE_NAMESPACE }}/ai-task-platform-worker:latest

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          tags: |
            ${{ env.IMAGE_NAMESPACE }}/ai-task-platform-frontend:${{ steps.vars.outputs.image_tag }}
            ${{ env.IMAGE_NAMESPACE }}/ai-task-platform-frontend:latest

  update-infra-repo:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout infra repo
        uses: actions/checkout@v4
        with:
          repository: yochna/ai-task-platform-infra
          token: ${{ secrets.INFRA_REPO_TOKEN }}
          path: infra-repo

      - name: Update image tags
        working-directory: infra-repo/k8s
        env:
          TAG: ${{ needs.build-and-push.outputs.image_tag }}
          NS: ${{ secrets.DOCKERHUB_USERNAME }}
        run: |
          sed -i "s|image: .*ai-task-platform-backend:.*|image: ${NS}/ai-task-platform-backend:${TAG}|" 20-backend.yaml
          sed -i "s|image: .*ai-task-platform-worker:.*|image: ${NS}/ai-task-platform-worker:${TAG}|" 21-worker.yaml
          sed -i "s|image: .*ai-task-platform-frontend:.*|image: ${NS}/ai-task-platform-frontend:${TAG}|" 22-frontend.yaml

      - name: Commit and push
        working-directory: infra-repo
        run: |
          git config user.name "ci-bot"
          git config user.email "ci-bot@users.noreply.github.com"
          git add k8s/20-backend.yaml k8s/21-worker.yaml k8s/22-frontend.yaml
          git diff --staged --quiet || git commit -m "ci: update image tags to ${{ needs.build-and-push.outputs.image_tag }}"
          git push